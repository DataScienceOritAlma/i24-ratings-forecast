name: Monthly model retrain

on:
  schedule:
    # 1st of every month at 04:00 UTC (07:00 Israel)
    - cron: '0 4 1 * *'
  # Allow manual trigger from the GitHub Actions UI (use after adding new monthly data)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Minimal subset needed for the retrain script
          pip install \
            numpy==1.26.4 \
            pandas==2.2.3 \
            scikit-learn==1.5.2 \
            joblib==1.4.2 \
            psycopg[binary]==3.2.3

      - name: Retrain model from Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONUTF8: '1'
        run: |
          python retrain_from_supabase.py

      - name: Commit + push new model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add model_saved.joblib retrain_log.md
          if git diff --staged --quiet; then
            echo "::notice::No model changes — nothing to commit"
            exit 0
          fi
          git commit -m "Auto-retrain $(date -u +'%Y-%m-%d')"
          git push
