# Dependency vulnerability scanning. Runs on every push to main, every PR,
# and weekly (Mondays 06:00 UTC) to catch CVEs disclosed after merge.
#
# Two scanners:
#   1. pip-audit — scans backend/requirements.txt against PyPI advisory DB.
#   2. npm audit  — scans frontend/package-lock.json against the npm advisory DB.
#
# Failure threshold is HIGH+. We don't break the build on MODERATE/LOW —
# they get logged and triaged manually so noise doesn't paralyze releases.

name: Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch: {}

jobs:
  python:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend dependencies
        # --vulnerability-service osv covers PyPI + OSV.
        # --strict makes the step fail on any vulnerability with fix available.
        run: pip-audit -r backend/requirements.txt --vulnerability-service osv --strict
        continue-on-error: false

  node:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install (no run-scripts — audit doesn't need them)
        run: npm ci --ignore-scripts
      - name: Audit frontend dependencies (high+ fails the build)
        run: npm audit --audit-level=high
