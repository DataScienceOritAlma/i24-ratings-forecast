# Automated tests — runs on every push to main + every PR.
# Loads the FastAPI app, the joblib model + quantile bundle, and exercises
# /health, /predict, /ask + the prediction_logic helpers.

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  backend:
    name: pytest (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run pytest
        # Tests fall back to the xlsx history when DATABASE_URL is unset,
        # so they need no DB / network access.
        env:
          REQUIRE_AUTH: "true"
        run: pytest backend/tests -v
